<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="#0a0a0a" stroke="#22c55e" stroke-width="2" stroke-opacity="0.3" />
  
  <!-- Subtle inner gradient glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0" />
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="40" fill="url(#glow)" />

  <!-- Logo Graphics -->
  <g stroke="#22c55e" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Connecting dashed/dotted grid lines -->
    <path d="M50 25v50M25 50h50M32.5 32.5l35 35M67.5 32.5l-35 35" stroke-dasharray="2 3" opacity="0.6" />
    
    <!-- Circular nodes -->
    <circle cx="50" cy="22" r="5" fill="#22c55e" />
    <circle cx="22" cy="50" r="5" fill="#22c55e" />
    <circle cx="78" cy="50" r="5" fill="#22c55e" />
    <circle cx="50" cy="78" r="5" fill="#22c55e" />
    
    <!-- Central connection node -->
    <circle cx="50" cy="50" r="9" stroke-width="4" />
    <circle cx="50" cy="50" r="3" fill="#22c55e" />
  </g>
</svg>
